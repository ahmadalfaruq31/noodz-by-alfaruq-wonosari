kind = "web"
previewPath = "/"
title = "Noodz — K-Ramen Landing Page"
version = "1.0.0"
id = "artifacts/noodz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20342

[services.development]
run = "pnpm --filter @workspace/noodz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/noodz", "run", "build" ]
publicDir = "artifacts/noodz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20342"
BASE_PATH = "/"
